name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # bridge/chat_runner.py is the bridge half of the chat/vision feature, so the
      # bridge test suite needs the vision deps (litellm, ddgs, trafilatura) too.
      - run: pip install -r bridge/requirements.txt -r vision/requirements.txt pytest pytest-asyncio
      - run: cd bridge && python -m pytest -q

  vision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r vision/requirements.txt
      - run: cd vision && PYTHONPATH=. python -m pytest -q

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check extension JS
        run: |
          for f in extension/background.js extension/content.js extension/popup/popup.js; do
            node --check "$f"
          done
