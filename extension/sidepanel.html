<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>realhands chat</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header>
      <div class="head-left">
        <div class="logo-square">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 1a5 5 0 0 1 5 5v3a5 5 0 0 1-10 0V6a5 5 0 0 1 5-5zm0 1a4 4 0 0 0-4 4v3a4 4 0 0 0 8 0V6a4 4 0 0 0-4-4zm1 10H7v2h2v-2zm-1 1.5A3.5 3.5 0 0 1 4.5 10h1A2.5 2.5 0 0 0 8 12.5z"/></svg>
        </div>
        <h1>RealHands</h1>
        <span id="version" class="version"></span>
      </div>
      <span id="connection-pill" class="pill pill-idle"><span class="pill-dot"></span><span class="pill-label">idle</span></span>
    </header>

    <section class="readout" id="readout">
      <div class="stat">
        <span class="stat-label">Run</span>
        <span id="stat-run" class="stat-value">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Step</span>
        <span id="stat-step" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Model</span>
        <span id="stat-model" class="stat-value">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Cost</span>
        <span id="stat-cost" class="stat-value">$0.0000</span>
      </div>
    </section>

    <main id="messages" class="messages" aria-live="polite">
      <div class="messages-empty">
        <span class="messages-empty-icon">&#9995;</span>
        <span>Describe a task and I'll do it — or switch to Ask to ask about this page.</span>
      </div>
    </main>

    <section id="approval-bar" class="approval-bar hidden">
      <div class="approval-text">
        <span class="approval-title" id="approval-title">Approve action?</span>
        <span id="approval-detail" class="approval-detail"></span>
      </div>
      <div class="approval-actions">
        <button id="approve-btn" type="button" class="btn-approve">Approve</button>
        <button id="reject-btn" type="button" class="btn-reject">Reject</button>
      </div>
    </section>

    <footer class="composer">
      <div class="composer-controls">
        <div class="interaction-toggle">
          <button id="mode-do-btn" type="button" class="toggle-btn toggle-active">Do</button>
          <button id="mode-ask-btn" type="button" class="toggle-btn">Ask</button>
        </div>
        <label class="mode-toggle" id="autonomy-toggle">
          <select id="mode-select" class="mode-select">
            <option value="gated" selected>Gated (approve sensitive)</option>
            <option value="ask">Ask before acting</option>
            <option value="auto">Full auto</option>
          </select>
        </label>
        <button id="stop-btn" type="button" class="btn-stop" disabled>Stop</button>
      </div>
      <div class="composer-input">
        <button id="mic-btn" type="button" class="btn-mic" title="Speak your task">
          <span class="mic-icon">&#127908;</span>
        </button>
        <textarea
          id="task-input"
          rows="1"
          placeholder="Describe a task for the agent…"
          data-placeholder-do="Describe a task for the agent…"
          data-placeholder-ask="Ask a question about this page…"
          spellcheck="false"
        ></textarea>
        <button id="send-btn" type="button" class="btn-send">Send</button>
      </div>
    </footer>

    <script src="sidepanel.js"></script>
  </body>
</html>
